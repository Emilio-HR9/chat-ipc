<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>Chat IPC</title>
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style.css') }}"
        />
        <script
            src="{{ url_for('static', filename='js/chat.js') }}"
            defer
        ></script>
    </head>
    <body>
        <div class="header">
            <h1>{{ local_ip }} - {{ hostname }}</h1>
            <div class="theme-switch">
                <span>Modo Oscuro</span>
                <label class="switch">
                    <input type="checkbox" id="dark-mode-toggle" />
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="main-container">
            <div class="top-panels">
                <div class="left-panel">
                    <h2>Mensajes</h2>
                    <div id="chat-box">{% include 'mensajes.html' %}</div>
                </div>

                <div class="right-panel">
                    <h2>Chats</h2>
                    <div
                        class="groups-container"
                        style="
                            display: flex;
                            flex-direction: column;
                            height: 100%;
                        "
                    >
                        <div
                            style="
                                margin-bottom: 20px;
                                flex: 1;
                                overflow-y: auto;
                            "
                        >
                            <div
                                id="chats-list"
                                style="
                                    padding: 10px;
                                    border: 1px dashed var(--border-color);
                                    border-radius: 5px;
                                    min-height: 150px;
                                "
                            >
                                <i>Cargando chats...</i>
                            </div>
                        </div>

                        <div
                            class="join-group-section"
                            style="margin-top: auto"
                        >
                            <h3>Unirse a Grupo Multicast</h3>
                            <form
                                id="join-group-form"
                                style="
                                    display: flex;
                                    flex-direction: column;
                                    gap: 10px;
                                "
                            >
                                <label for="group-ip">IP del Grupo:</label>
                                <div style="display: flex; gap: 10px">
                                    <input
                                        type="text"
                                        id="group-ip"
                                        name="ip"
                                        required
                                        placeholder="Ej. 224.1.1.2"
                                        style="flex: 1"
                                    />
                                    <button type="submit">Unirse</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-panel">
                <form id="chat-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="mode">Modo:</label>
                            <select id="mode" name="mode">
                                <option value="unicast" selected>
                                    Unicast
                                </option>
                                <option value="broadcast">Broadcast</option>
                                <option value="multicast">Multicast</option>
                                <option value="anycast">Anycast</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="ip">IP Destino:</label>
                            <input
                                type="text"
                                id="ip"
                                name="ip"
                                required
                                value="127.0.0.1"
                                placeholder="Ej. 192.168.1.10"
                            />
                        </div>
                    </div>
                    <div class="form-group message-group">
                        <label for="message">Mensaje:</label>
                        <input
                            type="text"
                            id="message"
                            name="message"
                            required
                            autofocus
                            autocomplete="off"
                            placeholder="Escribe tu mensaje aquí..."
                        />
                        <button type="submit">Enviar Mensaje</button>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
