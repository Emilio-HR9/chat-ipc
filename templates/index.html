<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>Chat</title>
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style.css') }}"
        />
        <script
            src="{{ url_for('static', filename='js/chat.js') }}"
            defer
        ></script>
    </head>
    <body>
        <h1>Chat (Unicast, Broadcast, Multicast, Anycast)</h1>

        <div id="chat-box">{% include 'mensajes.html' %}</div>

        <form id="chat-form">
            <div class="form-group">
                <label for="mode">Modo:</label>
                <select id="mode" name="mode">
                    <option value="unicast" selected>Unicast</option>
                    <option value="broadcast">Broadcast</option>
                    <option value="multicast">Multicast</option>
                    <option value="anycast">Anycast</option>
                </select>
            </div>
            <div class="form-group">
                <label for="ip">IP Destino:</label>
                <input
                    type="text"
                    id="ip"
                    name="ip"
                    required
                    value="127.0.0.1"
                    placeholder="Ej. 192.168.1.10"
                />
            </div>
            <div class="form-group">
                <label for="message">Mensaje:</label>
                <input
                    type="text"
                    id="message"
                    name="message"
                    required
                    autofocus
                    autocomplete="off"
                    placeholder="Escribe tu mensaje aquí..."
                />
            </div>
            <button type="submit">Enviar Mensaje</button>
        </form>

        <div
            style="
                margin-top: 20px;
                padding-top: 20px;
                border-top: 1px solid #ccc;
            "
        >
            <h3>Unirse a Grupo Multicast</h3>
            <form
                id="join-group-form"
                style="display: flex; gap: 10px; align-items: center"
            >
                <label for="group-ip">IP del Grupo:</label>
                <input
                    type="text"
                    id="group-ip"
                    name="ip"
                    required
                    placeholder="Ej. 224.1.1.2"
                    style="flex: 1; padding: 5px"
                />
                <button type="submit" style="padding: 5px 15px">Unirse</button>
            </form>
        </div>
    </body>
</html>
